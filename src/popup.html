<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      padding: 16px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e5e5;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #4f46e5;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }
    section {
      margin-bottom: 14px;
    }
    section h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 8px;
    }
    label.radio, label.check {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-row input[type="range"] {
      flex: 1;
      accent-color: #4f46e5;
    }
    .slider-row .value {
      min-width: 32px;
      text-align: right;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e5e5e5;
      color: #888;
      font-size: 12px;
    }
    .disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .api-key-row {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .api-key-row input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
    }
    .api-key-row input:focus {
      outline: none;
      border-color: #4f46e5;
    }
    .api-key-row .hint {
      font-size: 11px;
      color: #999;
    }
    .ai-section {
      display: none;
    }
    .ai-section.visible {
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bookface Filter</h1>
    <label class="toggle">
      <input type="checkbox" id="enabled" />
      <span class="slider"></span>
    </label>
  </header>

  <div id="settings-body">
    <section>
      <h2>Minimum Characters</h2>
      <div class="slider-row">
        <input type="range" id="minChars" min="0" max="200" step="10" />
        <span class="value" id="minCharsValue">50</span>
      </div>
    </section>

    <section>
      <h2>Filters</h2>
      <label class="check">
        <input type="checkbox" id="keywordFilter" />
        Keyword patterns
      </label>
      <label class="check">
        <input type="checkbox" id="lengthFilter" />
        Minimum length
      </label>
      <label class="check">
        <input type="checkbox" id="aiFilter" />
        AI-powered (Claude)
      </label>
      <div class="ai-section" id="aiSection">
        <div class="api-key-row">
          <input type="password" id="aiApiKey" placeholder="sk-ant-..." />
          <span class="hint">Claude API key &middot; uses Haiku (fast &amp; cheap)</span>
        </div>
      </div>
    </section>
  </div>

  <div class="footer" id="footer">
    Filtered <strong id="count">0</strong> posts on this page
  </div>

  <script src="popup.js"></script>
</body>
</html>
